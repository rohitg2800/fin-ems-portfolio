services:
  - type: web
    name: ems-luxe-store
    runtime: node
    plan: free
    buildCommand: cd ems-backend && npm ci
    startCommand: cd ems-backend && npm run migrate && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ems-luxe-db
          property: connectionString

databases:
  - name: ems-luxe-db
    plan: free
    databaseName: ems_luxe
    user: ems_luxe
