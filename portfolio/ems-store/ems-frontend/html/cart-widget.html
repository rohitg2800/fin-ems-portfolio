<!-- Global Cart Widget — Include on EVERY page -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<div id="cartDrawer" class="cart-drawer" style="display:none;">
  <div class="cart-header">
    <h3>Your Cart (<span id="cartCount">0</span>)</h3>
    <button class="cart-close" onclick="toggleCart()">×</button>
  </div>
  <div id="cartItems" class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <strong>Total: $<span id="cartTotal">0</span></strong>
    </div>
    <button class="btn-checkout" onclick="openCheckout()">
      <i class="fa-solid fa-credit-card"></i>
      Checkout
    </button>
    <button class="btn-clear" onclick="clearCart()">
      <i class="fa-solid fa-trash"></i>
      Clear Cart
    </button>
  </div>
</div>

<!-- Mobile Cart Button -->
<div id="mobileCartBtn" class="mobile-cart-btn" onclick="toggleCart()">
  <i class="fa-solid fa-bag-shopping"></i>
  <span id="mobileCartCount">0</span>
</div>

<!-- Overlay -->
<div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>

<style>
.cart-drawer {
  position: fixed;
  top: 0; right: -500px; width: 400px; height: 100vh;
  background: var(--bg-color); border-left: 1px solid var(--border-color);
  box-shadow: -5px 0 20px rgba(0,0,0,0.1); z-index: 9999;
  transition: right 0.3s ease; overflow-y: auto;
}
.cart-drawer.open { right: 0; }
.cart-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
.cart-header h3 { margin: 0; }
.cart-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--gray); }
.cart-items { padding: 20px; max-height: 60vh; overflow-y: auto; }
.cart-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
.cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
.cart-item-info { flex: 1; }
.cart-item-info h4 { margin: 0 0 4px 0; font-size: 14px; }
.cart-item-price { font-weight: 600; color: var(--accent); }
.cart-qty { display: flex; align-items: center; gap: 8px; font-size: 14px; }
.qty-btn { width: 28px; height: 28px; border: 1px solid var(--border-color); background: var(--card-bg); border-radius: 4px; cursor: pointer; }
.cart-footer { padding: 20px; border-top: 1px solid var(--border-color); }
.cart-total { margin-bottom: 16px; font-size: 20px; text-align: center; }
.btn-checkout, .btn-clear { width: 100%; padding: 14px; margin-bottom: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-checkout { background: var(--accent); color: white; }
.btn-checkout:hover { background: #4a2003; }
.btn-clear { background: #dc3545; color: white; font-size: 14px; }
.btn-clear:hover { background: #c82333; }
.mobile-cart-btn { 
  position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; 
  background: var(--accent); color: white; border-radius: 50%; 
  display: flex; flex-direction: column; align-items: center; justify-content: center; 
  box-shadow: 0 4px 20px rgba(87,36,3,0.4); cursor: pointer; z-index: 999; font-size: 20px; 
}
.mobile-cart-btn span { font-size: 12px; margin-top: 2px; background: #dc3545; border-radius: 12px; padding: 2px 6px; min-width: 20px; }
.cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9998; display: none; }
.cart-overlay.active { display: block; }
@media (max-width: 768px) { .cart-drawer { width: 100%; right: -100%; } }
</style>

<script>
// Global Cart Functions
function updateCartDisplay() {
  const cart = getCart();
  const count = Object.values(cart).reduce((sum, qty) => sum + qty, 0);
  const total = Object.entries(cart).reduce((sum, [id, qty]) => {
    const p = PRODUCT_MAP[id]; return sum + (p ? p.price * qty : 0);
  }, 0);

  document.getElementById("cartCount").textContent = count;
  document.getElementById("mobileCartCount").textContent = count;
  document.getElementById("cartTotal").textContent = total.toFixed(2);
  renderCartItems(cart);
  toggleMobileCartBadge(count > 0);
}

function renderCartItems(cart) {
  const container = document.getElementById("cartItems");
  if (!Object.keys(cart).length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray);">Your cart is empty</div>';
    return;
  }
  
  container.innerHTML = Object.entries(cart).map(([id, qty]) => {
    const p = PRODUCT_MAP[id];
    if (!p) return "";
    return `
      <div class="cart-item">
        <img src="${p.image}" alt="${p.name}">
        <div class="cart-item-info">
          <h4>${p.name}</h4>
          <div class="cart-item-price">$${p.price.toFixed(2)} each</div>
        </div>
        <div class="cart-qty">
          <button class="qty-btn" onclick="updateQty('${id}', -1)">−</button>
          <span>${qty}</span>
          <button class="qty-btn" onclick="updateQty('${id}', 1)">+</button>
        </div>
      </div>
    `;
  }).join("");
}

function toggleCart() {
  const drawer = document.getElementById("cartDrawer");
  const overlay = document.getElementById("cartOverlay");
  drawer.classList.toggle("open");
  overlay.classList.toggle("active");
}

function openCheckout() {
  toggleCart();
  // Open checkout modal or redirect to checkout page
  document.getElementById("checkoutModal").classList.add("active"); // if modal exists
  // OR: window.location.href = "checkout.html";
}

function toggleMobileCartBadge(show) {
  document.getElementById("mobileCartBtn").style.display = show ? "flex" : "none";
}

// Initialize cart on page load
document.addEventListener("DOMContentLoaded", () => {
  updateCartDisplay();
});
</script>
