<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Portal — EMS Luxe Supply</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">

  <style>
    /* Specific Admin Overrides to ensure the dashboard remains highly readable */
    :root {
      --bg: #f7f4ef;
      --card-strong: #ffffff;
      --border: rgba(87, 36, 3, 0.12);
    }
    [data-theme="dark"] {
      --bg: #0b0a08;
      --card-strong: #171210;
    }

    body {
      background-color: var(--bg);
      font-family: 'Poppins', sans-serif;
    }

    .admin-stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .admin-stat-card {
      background: var(--card-strong);
      padding: 25px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }

    .admin-table-container {
      background: var(--card-strong);
      border-radius: 24px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.04);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: rgba(188, 148, 55, 0.05);
      padding: 18px;
      text-align: left;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary);
    }

    td {
      padding: 18px;
      border-bottom: 1px solid var(--border);
    }

    .order-id-badge {
      font-family: monospace;
      font-weight: bold;
      color: var(--primary);
      background: rgba(188, 148, 55, 0.1);
      padding: 4px 8px;
      border-radius: 6px;
    }

    .status-confirmed {
      color: #16a34a;
      background: rgba(22, 163, 74, 0.1);
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .logout-btn {
      background: rgba(220, 38, 38, 0.1);
      color: #dc2626;
      border: 1px solid #dc2626;
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .logout-btn:hover {
      background: #dc2626;
      color: white;
    }
  </style>

  <script>
    // --- ADMINISTRATIVE GUARD (RUNS IMMEDIATELY) ---
    (function protectPage() {
      const token = localStorage.getItem('ems_admin_token');
      if (!token) {
        window.location.href = 'admin-login.html';
      }
    })();
  </script>
</head>
<body>

  <header class="topbar">
    <div class="container topbar-inner">
      <a href="../index.html" class="brand">
        <div class="brand-mark"><i class="fa-solid fa-shield-halved"></i></div>
        <div>
          <div class="brand-title">EMS LUXE SUPPLY</div>
          <div class="fine">ADMINISTRATIVE PORTAL</div>
        </div>
      </a>

      <div class="topbar-actions">
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
          <i class="fa-solid fa-moon" id="themeIcon" aria-hidden="true"></i>
          <span id="themeText">Dark</span>
        </button>
        <button onclick="adminLogout()" class="logout-btn">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 40px 0;">
    
    <div class="hero-card" style="margin-bottom: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-2));">
       <h1 style="color: white; font-family: 'Cinzel';">Executive Dashboard</h1>
       <p style="color: rgba(255,255,255,0.8);">Real-time monitoring of global inventory transactions and customer fulfillment.</p>
    </div>

    <div class="admin-stats-container">
      <div class="admin-stat-card">
        <div style="color: var(--muted); font-size: 0.8rem; font-weight: 700;">TOTAL REVENUE</div>
        <div id="totalRevenue" style="font-size: 2rem; font-weight: 700; color: var(--primary);">$0.00</div>
      </div>
      <div class="admin-stat-card">
        <div style="color: var(--muted); font-size: 0.8rem; font-weight: 700;">TOTAL ORDERS</div>
        <div id="totalOrders" style="font-size: 2rem; font-weight: 700; color: var(--primary);">0</div>
      </div>
      <div class="admin-stat-card">
        <div style="color: var(--muted); font-size: 0.8rem; font-weight: 700;">SYSTEM STATUS</div>
        <div style="color: #16a34a; font-weight: 700;"><i class="fa-solid fa-circle-check"></i> Encrypted & Live</div>
      </div>
      <div class="admin-stat-card">
        <div style="color: var(--muted); font-size: 0.8rem; font-weight: 700;">TOP SKUS</div>
        <div id="topSkusList" style="margin-top: 12px; display: grid; gap: 10px;"></div>
      </div>
    </div>

    <div style="display: flex; gap: 15px; margin-bottom: 25px; align-items: center;">
      <div style="flex: 1; position: relative;">
        <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 15px; top: 15px; color: var(--muted);"></i>
        <input type="text" id="searchInput" placeholder="Search by name, email, or order ID..." style="width: 100%; padding: 12px 12px 12px 45px; border-radius: 12px; border: 1px solid var(--border); background: var(--card-strong); color: var(--text);">
      </div>
      <button class="btn alt" onclick="exportToCSV()"><i class="fa-solid fa-file-csv"></i> Export Data</button>
    </div>

    <div class="admin-table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Date</th>
            <th>Total</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          </tbody>
      </table>
    </div>
  </main>

  <div id="orderModal" class="modal-backdrop">
    <div class="modal-card" style="max-width: 600px;">
      <div class="modal-header">
        <h3 id="modalTitle">Order Details</h3>
        <button id="closeModal" class="modal-close-btn">×</button>
      </div>
      <div class="modal-body" id="modalContent"></div>
    </div>
  </div>

  <script>
    const API_BASE = (() => {
      const origin = window.location?.origin;
      if (origin && origin.startsWith("http")) {
        const isLocal = /localhost|127\.0\.0\.1/.test(origin);
        const port = window.location?.port;
        if (isLocal && port && port !== "3000" && port !== "4000") {
          return "http://localhost:4000/api";
        }
        return `${origin}/api`;
      }
      return "http://localhost:4000/api";
    })();
    let allOrders = [];
    let statsLoaded = false;

    function adminLogout() {
      localStorage.removeItem('ems_admin_token');
      window.location.href = 'admin-login.html';
    }

    async function fetchLiveOrders() {
      const token = localStorage.getItem('ems_admin_token');
      const body = document.getElementById('ordersBody');
      
      try {
        const res = await fetch(`${API_BASE}/admin/orders`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (res.status === 401 || res.status === 403) return adminLogout();

        allOrders = await res.json();
        renderTable(allOrders);
        if (!statsLoaded) {
          updateStats(allOrders);
        }
      } catch (err) {
        body.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red; padding:40px;">Failed to connect to Secure Database.</td></tr>`;
      }
    }

    function renderTable(orders) {
      const body = document.getElementById('ordersBody');
      body.innerHTML = orders.map(o => `
        <tr>
          <td><span class="order-id-badge">#${o.id || o.orderId}</span></td>
          <td>
            <div style="font-weight:600;">${o.name || o.user_name}</div>
            <div style="font-size:0.8rem; color:var(--muted);">${o.email}</div>
          </td>
          <td style="font-size:0.9rem;">${new Date(o.created_at || o.date).toLocaleDateString()}</td>
          <td style="font-weight:700; color:var(--primary);">$${parseFloat(o.total).toFixed(2)}</td>
          <td><span class="status-confirmed">Confirmed</span></td>
          <td>
            <button class="btn secondary" style="padding: 6px 12px; font-size: 0.8rem;" onclick="viewDetails(${o.id || o.orderId})">View Details</button>
          </td>
        </tr>
      `).join('');
    }

    function updateStats(orders) {
      const total = orders.reduce((sum, o) => sum + parseFloat(o.total), 0);
      document.getElementById('totalRevenue').textContent = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
      document.getElementById('totalOrders').textContent = orders.length;
    }

    function renderTopSkus(list) {
      const container = document.getElementById('topSkusList');
      if (!container) return;
      if (!list || !list.length) {
        container.innerHTML = `<div style="color: var(--muted); font-size: 0.85rem;">No sales yet.</div>`;
        return;
      }

      container.innerHTML = list.map(item => `
        <div style="display:flex; justify-content: space-between; gap: 12px; font-size: 0.9rem;">
          <div style="font-weight: 600;">${item.name}</div>
          <div style="color: var(--primary); font-weight: 700;">${item.units} sold</div>
        </div>
      `).join('');
    }

    async function fetchAdminStats() {
      const token = localStorage.getItem('ems_admin_token');
      try {
        const res = await fetch(`${API_BASE}/admin/stats`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Stats fetch failed');
        const data = await res.json();

        statsLoaded = true;
        document.getElementById('totalRevenue').textContent =
          `$${Number(data.totalRevenue || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
        document.getElementById('totalOrders').textContent = Number(data.totalOrders || 0);
        renderTopSkus(data.topSkus || []);
      } catch (err) {
        statsLoaded = false;
        renderTopSkus([]);
      }
    }

    // Search Filtering
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const val = e.target.value.toLowerCase();
      const filtered = allOrders.filter(o => 
        o.name?.toLowerCase().includes(val) || 
        o.email?.toLowerCase().includes(val) || 
        String(o.id).includes(val)
      );
      renderTable(filtered);
    });

    document.getElementById('closeModal').onclick = () => document.getElementById('orderModal').classList.remove('active');

    window.viewDetails = (id) => {
      const o = allOrders.find(order => (order.id || order.orderId) == id);
      const modal = document.getElementById('orderModal');
      const content = document.getElementById('modalContent');
      
      content.innerHTML = `
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
          <div>
            <h4 style="margin-bottom:10px; color:var(--primary);">Customer Info</h4>
            <p><strong>Phone:</strong> ${o.phone || 'N/A'}</p>
            <p><strong>Address:</strong><br>${o.address || 'N/A'}</p>
          </div>
          <div>
            <h4 style="margin-bottom:10px; color:var(--primary);">Order Timeline</h4>
            <p><strong>Processed:</strong> ${new Date(o.created_at || o.date).toLocaleString()}</p>
            <p><strong>Security:</strong> AES-256 Encrypted</p>
          </div>
        </div>
      `;
      modal.classList.add('active');
    };

    function exportToCSV() {
        const headers = ["Order ID", "Customer", "Email", "Total", "Date"];
        const rows = allOrders.map(o => [o.id, o.name, o.email, o.total, o.created_at]);
        let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", "ems_luxe_orders.csv");
        document.body.appendChild(link);
        link.click();
    }

    document.addEventListener('DOMContentLoaded', () => {
      fetchAdminStats();
      fetchLiveOrders();
    });
  </script>
</body>
</html>
