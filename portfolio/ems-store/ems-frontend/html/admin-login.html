<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restricted Access — EMS Luxe Store Admin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="admin-login-page">
    <div class="admin-login-card">
        <i class="fa-solid fa-user-shield brand-icon"></i>
        <h2 class="admin-login-title">Store Admin Portal</h2>
        <p class="admin-login-subtitle">Store Admin Authorization Required</p>
        <form id="adminLoginForm" class="auth-form-content">
            <label class="auth-field">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="adminEmail" placeholder="Admin Email" required>
            </label>
            <label class="auth-field">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="adminPassword" placeholder="Admin Password" required>
            </label>
            <button type="submit" class="btn">Authorize Access</button>
        </form>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            try {
                const data = await window.EMSApi.auth.login({ email, password });

                if (data.success && data.user.role === 'admin') {
                    localStorage.setItem('ems_admin_token', data.token);
                    window.location.href = 'ems_orders.html';
                } else {
                    alert('Access Denied: Invalid Admin Credentials');
                }
            } catch (err) {
                alert(err.message || 'Server Error');
            }
        });
    </script>
</body>
</html>
