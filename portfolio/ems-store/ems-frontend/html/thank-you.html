<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success | EMS Luxe Supply</title>
  
  <meta name="description" content="Thank you for your business with EMS Luxe Supply. Your request has been securely processed.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="../css/styles.css">
  
  <style>
    /* =========================================
       PREMIUM SUCCESS PAGE STYLES
       ========================================= */
    .thank-you-hero {
      min-height: calc(100vh - 140px); /* Accounts for header/footer */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: 
        radial-gradient(circle at center, rgba(188, 148, 55, 0.05) 0%, transparent 60%),
        var(--bg-color);
    }
    
    .thank-you-card {
      background: var(--card-strong, #ffffff);
      border-radius: 24px;
      padding: 60px 40px;
      max-width: 540px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(188, 148, 55, 0.3);
      box-shadow: 
        0 20px 60px rgba(87, 36, 3, 0.08),
        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      transform: translateY(20px);
      animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    [data-theme="dark"] .thank-you-card {
      background: var(--card-strong, #111);
      border-color: rgba(255, 217, 119, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    /* Top decorative bar */
    .thank-you-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
    }
    
    .thank-you-icon {
      font-size: 72px;
      color: var(--success, #16a34a);
      margin-bottom: 24px;
      display: inline-block;
      background: rgba(22, 163, 74, 0.1);
      width: 120px;
      height: 120px;
      line-height: 120px;
      border-radius: 50%;
      animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    [data-theme="dark"] .thank-you-icon {
      color: #22c55e;
      background: rgba(34, 197, 94, 0.15);
    }
    
    .thank-you-title {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      color: var(--text-color);
      margin-bottom: 12px;
      font-weight: 700;
    }
    
    .thank-you-text {
      color: var(--gray);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 35px;
    }
    
    .action-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @keyframes floatUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    /* Mobile Adjustments */
    @media (max-width: 640px) {
      .thank-you-card {
        padding: 40px 24px;
      }
      .action-buttons {
        flex-direction: column;
      }
      .action-buttons .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body data-theme="light">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="../index.html">
        <div class="brand-mark">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <div>
          <div class="brand-title">EMS LUXE SUPPLY</div>
          <div class="fine">PREMIUM FIELD GEAR</div>
        </div>
      </a>
      
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon" id="themeIcon" aria-hidden="true"></i>
        <span id="themeText">Dark</span>
      </button>
    </div>
  </header>

  <main class="thank-you-hero">
    <div class="thank-you-card">
      <div class="thank-you-icon">
        <i class="fa-solid fa-check"></i>
      </div>
      <h1 class="thank-you-title">Success!</h1>
      <p class="thank-you-text">
        Your request has been securely processed by EMS Luxe Supply. 
        <strong>You will receive a confirmation email shortly.</strong>
      </p>

      <div id="receiptBox" style="display:none; text-align:left; margin: 0 auto 24px; max-width: 420px; background: rgba(0,0,0,0.02); padding: 16px 18px; border-radius: 12px; border: 1px solid var(--border-color);">
        <div style="font-weight:700; margin-bottom:6px;">Order Summary</div>
        <div id="receiptContent" style="color: var(--gray); font-size: 0.95rem;">Loading receipt...</div>
      </div>
      
      <div class="action-buttons">
        <a href="shop.html" class="btn">
          <i class="fa-solid fa-bag-shopping"></i> Continue Shopping
        </a>
        <a href="contact.html" class="btn secondary">
          <i class="fa-solid fa-headset"></i> Contact Support
        </a>
      </div>
    </div>
  </main>

  <footer style="text-align: center; padding: 25px; color: var(--gray); font-size: 0.9rem; border-top: 1px solid var(--border);">
    <div class="container">
      © 2026 EMS Luxe Supply. All rights reserved. | 
      <a href="contact.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Contact Us</a>
    </div>
  </footer>

  <script src="../js/script.js"></script>
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const savedTheme = localStorage.getItem('ems_theme_preference') || 
                        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      const icon = document.getElementById('themeIcon');
      const text = document.getElementById('themeText');
      if (icon) icon.className = savedTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
      if (text) text.textContent = savedTheme === 'dark' ? 'Light' : 'Dark';

      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      const orderIdQuery = params.get('order_id');
      const apiBase = (window.location.host === 'fin-ems-frontend.onrender.com')
        ? 'https://fin-ems-backend.onrender.com'
        : '';
      const box = document.getElementById('receiptBox');
      const content = document.getElementById('receiptContent');

      function renderReceipt(receipt) {
        if (!box || !content) return;
        const order = receipt.order || {};
        const totals = receipt.totals || {};
        const items = Array.isArray(receipt.items) ? receipt.items : [];
        const currency = "USD";
        const status = String(order.status || 'pending').toUpperCase();
        const itemsHtml = items.length
          ? `<table style="width:100%; border-collapse: collapse; margin-top: 10px;">
              <thead>
                <tr>
                  <th style="text-align:left; border-bottom:1px solid var(--border-color); padding:6px 4px;">Item</th>
                  <th style="text-align:center; border-bottom:1px solid var(--border-color); padding:6px 4px;">Qty</th>
                  <th style="text-align:right; border-bottom:1px solid var(--border-color); padding:6px 4px;">Line</th>
                </tr>
              </thead>
              <tbody>
                ${items.map((item) => `
                  <tr>
                    <td style="padding:6px 4px;">${item.name}</td>
                    <td style="padding:6px 4px; text-align:center;">${item.quantity}</td>
                    <td style="padding:6px 4px; text-align:right;">$${Number(item.line_total || 0).toFixed(2)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>`
          : '<div style="margin-top:8px;">No line items found.</div>';

        content.innerHTML = `
          <div><strong>Order:</strong> #${order.id || '—'}</div>
          <div><strong>Status:</strong> ${status}</div>
          <div><strong>Email:</strong> ${order.email || '—'}</div>
          <div><strong>Total:</strong> ${currency} $${Number(totals.grand_total || order.total || 0).toFixed(2)}</div>
          ${itemsHtml}
        `;
        box.style.display = 'block';
      }

      function fetchReceipt(orderId, emailHint) {
        const emailQuery = emailHint ? `?email=${encodeURIComponent(emailHint)}` : '';
        return fetch(`${apiBase}/api/orders/${orderId}/receipt${emailQuery}`).then(r => r.json());
      }

      const localOrder = JSON.parse(localStorage.getItem('ems_last_order') || 'null');

      if (sessionId) {
        fetch(`${apiBase}/api/checkout/session/${sessionId}`)
          .then(r => r.json())
          .then((data) => {
            const orderId = data?.order?.id;
            if (!orderId) throw new Error('No order id found');
            return fetchReceipt(orderId, data?.email);
          })
          .then((receipt) => {
            if (receipt?.error) throw new Error(receipt.error);
            renderReceipt(receipt);
          })
          .catch(() => {
            if (content) content.textContent = 'Unable to load receipt right now.';
          });
        return;
      }

      const fallbackOrderId = orderIdQuery || localOrder?.orderId;
      if (fallbackOrderId && localOrder?.email) {
        fetchReceipt(fallbackOrderId, localOrder.email)
          .then((receipt) => {
            if (receipt?.error) throw new Error(receipt.error);
            renderReceipt(receipt);
          })
          .catch(() => {
            if (content) content.textContent = 'Unable to load receipt right now.';
          });
      } else if (content) {
        content.textContent = 'Receipt unavailable. Please contact support with your order details.';
      }
    });
  </script>
</body>
</html>
