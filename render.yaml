databases:
  - name: fin-ems-db
    databaseName: fin_ems
    user: fin_ems_user
    plan: free
    ipAllowList: []

services:
  - type: web
    name: fin-ems-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run migrate && node server.js
    healthCheckPath: /api/health
    rootDir: portfolio/ems-store/ems-backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fin-ems-db
          property: connectionString
      - key: JWT_SECRET
        sync: false

  - type: web
    name: fin-ems-frontend
    runtime: static
    rootDir: portfolio/ems-store/ems-frontend
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /api/*
        destination: https://fin-ems-backend.onrender.com/api/*
