services:
  - type: web
    name: fin-ems-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: portfolio/ems-store/ems-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ems-luxe-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_NAME
        value: EMS Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: ems-luxe-db
    plan: free
    databaseName: ems_luxe
    user: ems_luxe
