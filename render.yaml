databases:
  - name: fin-ems-db
    databaseName: fin_ems
    user: fin_ems_user
    region: oregon
    plan: free
    ipAllowList: []

services:
  - type: web
    name: fin-ems-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: portfolio/ems-store/ems-backend
    buildCommand: npm install
    startCommand: npm run migrate && node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: fin-ems-db
          property: connectionString
      - key: DB_SSL
        value: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_NAME
        value: EMS Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    name: fin-ems-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: portfolio/ems-store/ems-frontend
    staticPublishPath: .
    autoDeploy: true
    routes:
      - type: rewrite
        source: /api/*
        destination: https://fin-ems-backend.onrender.com/api/*
