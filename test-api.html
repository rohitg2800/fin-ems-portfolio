<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Connection Test</h1>
    <button onclick="testConnection()">Test Connection</button>
    <button onclick="testLogin()">Test Login</button>
    <div id="results"></div>

    <script>
        const API_BASE_URL = 'http://localhost:4000';
        
        async function testConnection() {
            try {
                const response = await fetch(`${API_BASE_URL}/`);
                const text = await response.text();
                document.getElementById('results').innerHTML = `<p style="color: green;">Connection Success: ${text}</p>`;
            } catch (error) {
                document.getElementById('results').innerHTML = `<p style="color: red;">Connection Failed: ${error.message}</p>`;
                console.error('Full error:', error);
            }
        }
        
        async function testLogin() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                document.getElementById('results').innerHTML = `<p style="color: green;">Login Success: ${JSON.stringify(data)}</p>`;
            } catch (error) {
                document.getElementById('results').innerHTML = `<p style="color: red;">Login Failed: ${error.message}</p>`;
                console.error('Full error:', error);
            }
        }
    </script>
</body>
</html>
